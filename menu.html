<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Savoria | Menu</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="preload" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" as="style" onload="this.onload=null;this.rel='stylesheet'" integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg==" crossorigin="anonymous" referrerpolicy="no-referrer" />
  <noscript><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg==" crossorigin="anonymous" referrerpolicy="no-referrer" /></noscript>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body data-page="menu">
  <header id="siteHeader"></header>

  <main class="section container">
    <h1 class="page-title">Our Menu</h1>

    <div class="menu-controls">
      <div class="filter-group" id="filterGroup">
        <button class="chip active" data-filter="All">All</button>
        <button class="chip" data-filter="Pizza"><i class="fa-solid fa-pizza-slice"></i> Pizza</button>
        <button class="chip" data-filter="Burger"><i class="fa-solid fa-burger"></i> Burger</button>
        <button class="chip" data-filter="Drinks"><i class="fa-solid fa-glass-water"></i> Drinks</button>
        <button class="chip" data-filter="Desserts"><i class="fa-solid fa-ice-cream"></i> Desserts</button>
      </div>
      <div class="search-wrap">
        <input type="search" id="menuSearch" placeholder="Search food items..." aria-label="Search menu items" />
      </div>
    </div>

    <div id="menuGrid" class="menu-grid"></div>
    <p id="noResults" class="empty-state hidden">No items match your search.</p>
    <div class="menu-load-more-wrap">
      <button id="loadMoreBtn" class="btn btn-outline hidden" type="button">Load More</button>
    </div>
  </main>

  <button id="goToTopBtn" class="btn btn-primary go-to-top hidden" aria-label="Go to top">
    <i class="fa-solid fa-arrow-up"></i>
  </button>

  <footer id="siteFooter"></footer>

  <script src="js/script.js"></script>
</body>
</html>
